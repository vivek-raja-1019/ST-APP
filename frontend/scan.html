<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📷 Scan & Pay - ST PAY</title>

  <!-- ZXing QR Scanner -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
      background:#ffffff;
      color:#111;
      display:flex;
      justify-content:center;
      padding:14px;
      box-sizing:border-box;
    }

    .app{
      width:420px;
      max-width:100%;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 0 12px 0;
      position:sticky;
      top:0;
      background:#fff;
      z-index:5;
    }

    .title{
      font-weight:900;
      letter-spacing:0.4px;
    }

    .btn{
      border:none;
      background:#000;
      color:#fff;
      font-weight:800;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
    }
    .btn:active{transform:scale(0.99);}

    .card{
      background:#f4f4f4;
      border:1px solid #e7e7e7;
      border-radius:18px;
      padding:12px;
      box-shadow:0 10px 24px rgba(0,0,0,0.08);
    }

    .videoWrap{
      margin-top:10px;
      border-radius:16px;
      overflow:hidden;
      background:#000;
      border:1px solid #e7e7e7;
    }

    video{
      width:100%;
      height:320px;
      object-fit:cover;
      background:#000;
      display:block;
    }

    .row{
      display:flex;
      gap:10px;
      margin-top:12px;
    }
    .row .btn{flex:1;}

    .status{
      margin-top:12px;
      font-size:13px;
      color:#444;
      line-height:1.4;
    }

    .resultBox{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      background:#fff;
      border:1px solid #e7e7e7;
      display:none;
    }

    .resultBox b{display:block;margin-bottom:6px;}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size:12px;}

    .hint{
      margin-top:10px;
      font-size:12px;
      color:#666;
    }

    @media(max-width:420px){
      video{height:360px;}
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="top">
      <div class="title">📷 Scan & Pay</div>
      <button class="btn" onclick="back()">Back</button>
    </div>

    <div class="card">
      <div style="font-weight:800;">Camera</div>
      <div class="hint">
        ✅ Mobile-la camera permission allow pannu.  
        ⚠️ file:// la open pannadha. Live Server / localhost / https use pannu.
      </div>

      <div class="videoWrap">
        <video id="preview" playsinline></video>
      </div>

      <div class="row">
        <button class="btn" onclick="startScan()">Start</button>
        <button class="btn" onclick="stopScan()">Stop</button>
      </div>

      <div class="status" id="status">Ready. Tap <b>Start</b>.</div>

      <div class="resultBox" id="resultBox">
        <b>Scanned Data</b>
        <div class="mono" id="resultText"></div>
        <div class="row" style="margin-top:10px;">
          <button class="btn" onclick="payNow()">Pay</button>
          <button class="btn" onclick="copyResult()">Copy</button>
        </div>
      </div>
    </div>

  </div>

<script>
  // session check
  if(!sessionStorage.getItem("user")){
    window.location="index.html";
  }

  const codeReader = new ZXing.BrowserMultiFormatReader();
  let currentDeviceId = null;
  let lastScannedText = "";

  async function startScan(){
    lastScannedText = "";
    setStatus("Starting camera...");

    try{
      const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
      if(!devices || devices.length === 0){
        setStatus("❌ No camera found.");
        return;
      }

      // Prefer back camera on phones (usually last device)
      currentDeviceId = devices[devices.length - 1].deviceId;

      document.getElementById("resultBox").style.display = "none";
      document.getElementById("resultText").innerText = "";

      await codeReader.decodeFromVideoDevice(
        currentDeviceId,
        "preview",
        (result, err) => {
          if(result){
            lastScannedText = result.getText();
            showResult(lastScannedText);
            setStatus("✅ QR scanned! Tap Pay or Copy.");
            // Auto stop after first scan
            stopScan();
          }
        }
      );

      setStatus("📷 Camera ON. Point to QR...");

    }catch(e){
      // Common errors: NotAllowedError, NotFoundError
      setStatus("❌ Camera permission denied / not available. Use Live Server or HTTPS. ("+ (e.name || "Error") +")");
    }
  }

  function stopScan(){
    try{
      codeReader.reset();
      setStatus("Camera stopped.");
    }catch(e){}
  }

  function showResult(text){
    const box = document.getElementById("resultBox");
    const out = document.getElementById("resultText");
    out.innerText = text;
    box.style.display = "block";
  }

  function copyResult(){
    if(!lastScannedText){ alert("No scan data"); return; }
    navigator.clipboard?.writeText(lastScannedText);
    alert("Copied ✔");
  }

  function payNow(){
    if(!lastScannedText){ alert("No scan data"); return; }

    // QR text could be UPI ID / name / any string
    // We'll store it and open transaction page
    sessionStorage.setItem("quick_receiver", lastScannedText);
    window.location = "transaction.html";
  }

  function setStatus(msg){
    document.getElementById("status").innerHTML = msg;
  }

  function back(){
    stopScan();
    window.location="dashboard.html";
  }

  // auto start when page opens (nice for mobile)
  window.onload = () => {
    startScan();
  };
</script>

</body>
</html>
