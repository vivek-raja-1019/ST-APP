<!DOCTYPE html>
<html>
<head>
<title>ST PAY - Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="script.js"></script>

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --card:#000;
  --cardText:#fff;
  --muted:#666;
  --shadow: rgba(0,0,0,0.10);
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:14px;
  box-sizing:border-box;
}

.app{ width:420px; max-width:100%; }

.topbar{
  position:sticky;
  top:0;
  background:var(--bg);
  padding:10px 0 12px 0;
  z-index:5;
}

.titleRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.brand{ font-weight:800; letter-spacing:0.5px; }

.pill{
  background:#f2f2f2;
  border:1px solid #e5e5e5;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  color:var(--muted);
}

.search{
  margin-top:10px;
  display:flex;
  gap:8px;
}

.search input{
  flex:1;
  padding:12px 12px;
  border-radius:12px;
  border:1px solid #e5e5e5;
  outline:none;
  font-size:14px;
}

.search button{
  padding:12px 14px;
  border-radius:12px;
  border:none;
  background:var(--card);
  color:var(--cardText);
  font-weight:700;
  cursor:pointer;
}

.card{
  background:var(--card);
  color:var(--cardText);
  border-radius:16px;
  padding:14px;
  box-shadow:0 8px 22px var(--shadow);
}

.balanceCard{ margin-top:10px; }

.balanceTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.balanceLabel{ font-size:12px; opacity:0.8; }
.balanceValue{ font-size:22px; font-weight:800; margin-top:6px; }

.quickGrid{
  margin-top:12px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.qItem{
  background:var(--card);
  color:var(--cardText);
  border-radius:14px;
  padding:10px 8px;
  text-align:center;
  cursor:pointer;
  user-select:none;
  box-shadow:0 8px 22px var(--shadow);
  font-weight:700;
  font-size:12px;
}

.qIcon{
  width:28px; height:28px;
  margin:0 auto 6px auto;
  display:block;
}

.sectionTitle{
  margin:16px 2px 10px 2px;
  font-weight:800;
  font-size:14px;
}

/* PEOPLE */
.people{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.person{
  background:#f4f4f4;
  border:1px solid #ededed;
  border-radius:14px;
  padding:10px 8px;
  text-align:center;
  cursor:pointer;
}

.avatar{
  width:44px;height:44px;
  border-radius:50%;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  margin:0 auto 6px auto;
}

.pName{ font-size:12px; font-weight:700; }

/* Manage list */
.actionsList{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ===== ADDED: icons + 3 outline for manage rows ===== */
.actionRow{
  background:#f7f7f7;
  border:1px solid #e7e7e7;              /* outline 1 */
  border-left:4px solid #dcdcdc;          /* outline 2 */
  border-radius:16px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  box-shadow:0 6px 14px rgba(0,0,0,0.06); /* outline 3 */
}

.actionLeft{
  display:flex;
  align-items:center;
  gap:10px;
}

.miniIcon{
  width:34px;
  height:34px;
  border-radius:12px;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex:0 0 34px;
}

.actionText b{font-size:14px;}
.actionText span{color:var(--muted); font-size:12px;}

.arrow{
  font-size:18px;
  color:#444;
  font-weight:900;
}
/* ===== END ADDED ===== */

.hidden{display:none !important;}

@media (max-width:360px){
  .quickGrid{grid-template-columns:repeat(3,1fr);}
  .people{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body onload="initDashboard()">

<div class="app">

  <div class="topbar">
    <div class="titleRow">
      <div class="brand">ST PAY</div>
      <div class="pill">Home</div>
    </div>

    <div class="search">
      <input id="searchBox" placeholder="Search people, features..." oninput="applySearch()">
      <button onclick="clearSearch()">Clear</button>
    </div>
  </div>

  <div class="card balanceCard">
    <div class="balanceTop">
      <div>
        <div class="balanceLabel">Available balance</div>
        <div class="balanceValue">₹ <span id="balance">0</span></div>
      </div>
      <div class="pill" id="userPill">User</div>
    </div>
  </div>

  <!-- QUICK ACTIONS (all clickable to pages) -->
  <div class="quickGrid" id="featureGrid">
    <div class="qItem feature" data-label="transaction pay send money" onclick="goPage('transaction.html')">
      <img class="qIcon" alt="pay" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><path d='M16 30h32v18H16z' fill='%23000'/><path d='M20 26h24v6H20z' fill='%23fff'/></svg>">
      Pay
    </div>

    <div class="qItem feature" data-label="scan qr scan pay" onclick="goPage('scan.html')">
      <img class="qIcon" alt="scan" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><path d='M18 18h10v4h-6v6h-4zM36 18h10v10h-4v-6h-6zM18 36h4v6h6v4H18zM42 36h4v10H36v-4h6z' fill='%23000'/><path d='M22 30h20v4H22z' fill='%23fff'/></svg>">
      Scan
    </div>

    <div class="qItem feature" data-label="receive money" onclick="goPage('receive.html')">
      <img class="qIcon" alt="receive" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><path d='M32 44l-12-12h8V18h8v14h8z' fill='%23000'/></svg>">
      Receive
    </div>

    <div class="qItem feature" data-label="add money topup" onclick="goPage('addmoney.html')">
      <img class="qIcon" alt="add" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><path d='M30 18h4v28h-4z' fill='%23000'/><path d='M18 30h28v4H18z' fill='%23000'/></svg>">
      Add
    </div>

    <div class="qItem feature" data-label="history transactions" onclick="goPage('history.html')">
      <img class="qIcon" alt="history" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><path d='M32 18a14 14 0 1014 14h-4a10 10 0 11-3-7l-3 3h10V18l-3 3a13.9 13.9 0 00-11-3z' fill='%23000'/><path d='M30 24h4v10l7 4-2 3-9-5z' fill='%23fff'/></svg>">
      History
    </div>

    <div class="qItem feature" data-label="file transfer upload document" onclick="goPage('filetransfer.html')">
      <img class="qIcon" alt="files" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><path d='M18 22h16l4 4h8v20H18z' fill='%23000'/><path d='M22 30h20v4H22zM22 38h14v4H22z' fill='%23fff'/></svg>">
      Files
    </div>

    <div class="qItem feature" data-label="profile account settings help" onclick="goPage('profile.html')">
      <img class="qIcon" alt="profile" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><circle cx='32' cy='26' r='10' fill='%23000'/><path d='M16 54c2-10 12-14 16-14s14 4 16 14' fill='%23000'/></svg>">
      Profile
    </div>

    <div class="qItem feature" data-label="support help" onclick="goPage('help.html')">
      <img class="qIcon" alt="help" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' rx='14' fill='%2300c6ff'/><path d='M32 48a4 4 0 110-8 4 4 0 010 8zm0-34c8 0 14 5 14 12 0 8-8 10-10 14h-8c0-7 10-7 10-14 0-3-3-6-6-6s-6 2-7 6l-8-2c2-7 8-10 15-10z' fill='%23000'/></svg>">
      Help
    </div>
  </div>

  <div class="sectionTitle">People</div>
  <div class="people" id="peopleGrid">
    <div class="person personItem" data-name="Aravind" onclick="quickPay('Aravind')">
      <div class="avatar" style="background:#ff3b30;">A</div><div class="pName">Aravind</div>
    </div>
    <div class="person personItem" data-name="gojo" onclick="quickPay('gojo')">
      <div class="avatar" style="background:#ff9500;">G</div><div class="pName">gojo</div>
    </div>
    <div class="person personItem" data-name="rosyy" onclick="quickPay('rosyy')">
      <div class="avatar" style="background:#34c759;">R</div><div class="pName">rosyy</div>
    </div>
    <div class="person personItem" data-name="Vivek" onclick="quickPay('Vivek')">
      <div class="avatar" style="background:#007aff;">V</div><div class="pName">Vivek</div>
    </div>
    <div class="person personItem" data-name="Mani" onclick="quickPay('Mani')">
      <div class="avatar" style="background:#af52de;">M</div><div class="pName">Mani</div>
    </div>
    <div class="person personItem" data-name="Siva" onclick="quickPay('Siva')">
      <div class="avatar" style="background:#ff2d55;">S</div><div class="pName">Siva</div>
    </div>
    <div class="person personItem" data-name="vetri" onclick="quickPay('vetri')">
      <div class="avatar" style="background:#5856d6;">V</div><div class="pName">vetri</div>
    </div>
    <div class="person personItem" data-name="advika" onclick="quickPay('advika')">
      <div class="avatar" style="background:#00c7be;">A</div><div class="pName">advika</div>
    </div>
  </div>

  <div class="sectionTitle">Manage</div>
  <div class="actionsList" id="actionList">

    <div class="actionRow feature" data-label="transaction send money" onclick="goPage('transaction.html')">
      <div class="actionLeft">
        <div class="miniIcon">💸</div>
        <div class="actionText">
          <b>Send money</b><br><span>Pay to any user</span>
        </div>
      </div>
      <div class="arrow">›</div>
    </div>

    <div class="actionRow feature" data-label="history transactions" onclick="goPage('history.html')">
      <div class="actionLeft">
        <div class="miniIcon">🧾</div>
        <div class="actionText">
          <b>History</b><br><span>All payments & files</span>
        </div>
      </div>
      <div class="arrow">›</div>
    </div>

    <div class="actionRow feature" data-label="file transfer files" onclick="goPage('filetransfer.html')">
      <div class="actionLeft">
        <div class="miniIcon">📎</div>
        <div class="actionText">
          <b>File transfer</b><br><span>Send documents/media</span>
        </div>
      </div>
      <div class="arrow">›</div>
    </div>

    <div class="actionRow feature" data-label="help support" onclick="goPage('help.html')">
      <div class="actionLeft">
        <div class="miniIcon">🛟</div>
        <div class="actionText">
          <b>Support</b><br><span>Help & FAQs</span>
        </div>
      </div>
      <div class="arrow">›</div>
    </div>

  </div>

</div>

<script>
if(!sessionStorage.getItem("user")){
  window.location="index.html";
}

function goPage(page){ window.location = page; }

function initDashboard(){
  if(typeof loadBalance === "function"){ loadBalance(); }
  let u = sessionStorage.getItem("user") || "User";
  document.getElementById("userPill").innerText = u;
}

function applySearch(){
  let q = (document.getElementById("searchBox").value || "").trim().toLowerCase();

  document.querySelectorAll(".feature").forEach(el=>{
    let label = (el.getAttribute("data-label") || "").toLowerCase();
    el.classList.toggle("hidden", q && !label.includes(q));
  });

  document.querySelectorAll(".personItem").forEach(el=>{
    let name = (el.getAttribute("data-name") || "").toLowerCase();
    el.classList.toggle("hidden", q && !name.includes(q));
  });
}

function clearSearch(){
  document.getElementById("searchBox").value = "";
  applySearch();
}

function quickPay(name){
  sessionStorage.setItem("quick_receiver", name);
  goPage("transaction.html");
}
</script>

</body>
</html>
