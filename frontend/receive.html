<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⬇ Receive Money - ST PAY</title>
  <script src="script.js"></script>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
      background:#ffffff;
      color:#111;
      display:flex;
      justify-content:center;
      padding:14px;
      box-sizing:border-box;
    }
    .app{ width:420px; max-width:100%; }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:8px 0 12px 0;
      position:sticky;
      top:0;
      background:#fff;
      z-index:5;
    }
    .title{ font-weight:900; letter-spacing:0.4px; }

    .btn{
      border:none;
      background:#000;
      color:#fff;
      font-weight:800;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
    }
    .btn:active{transform:scale(0.99);}
    .btnGray{
      background:#f2f2f2;
      color:#111;
      border:1px solid #e5e5e5;
    }

    .card{
      background:#f4f4f4;
      border:1px solid #e7e7e7;
      border-radius:18px;
      padding:14px;
      box-shadow:0 10px 24px rgba(0,0,0,0.08);
      margin-top:10px;
    }

    .label{ font-size:12px; color:#666; margin-top:10px; }
    .field{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #d8d8d8;
      background:#fff;
      outline:none;
      margin-top:8px;
      box-sizing:border-box;
      font-size:14px;
    }

    .upiRow{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
    }
    .upiText{
      flex:1;
      background:#fff;
      border:1px solid #e5e5e5;
      padding:12px;
      border-radius:12px;
      font-weight:800;
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .qrWrap{
      margin-top:12px;
      background:#fff;
      border:1px solid #e5e5e5;
      border-radius:16px;
      padding:14px;
      text-align:center;
    }
    .qrWrap img{
      width:220px;
      height:220px;
      max-width:100%;
      border-radius:12px;
    }

    .row{
      display:flex;
      gap:10px;
      margin-top:12px;
    }
    .row .btn{ flex:1; }

    .hint{
      margin-top:10px;
      font-size:12px;
      color:#666;
      line-height:1.4;
    }

    .success{
      margin-top:10px;
      font-weight:800;
      color:#1a7f37;
      display:none;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="top">
      <div class="title">⬇ Receive Money</div>
      <button class="btn" onclick="back()">Back</button>
    </div>

    <div class="card">
      <div style="font-weight:900;">My Receive QR</div>
      <div class="hint">Pay panna friend QR scan pannitu send pannalam.</div>

      <div class="label">Your UPI ID (demo)</div>
      <div class="upiRow">
        <div class="upiText" id="upiIdText">stpay@demo</div>
        <button class="btn btnGray" onclick="copyUPI()">Copy</button>
      </div>

      <div class="label">Request amount (optional)</div>
      <input class="field" id="reqAmount" type="number" placeholder="Enter amount (e.g., 250)" oninput="updateQR()"/>

      <div class="label">Note (optional)</div>
      <input class="field" id="reqNote" placeholder="e.g., Tea money" oninput="updateQR()"/>

      <div class="qrWrap">
        <div style="font-weight:800; margin-bottom:10px;">Scan to Pay</div>
        <img id="qrImg" alt="QR" src="" />
        <div class="hint" id="qrPayloadHint"></div>
      </div>

      <div class="row">
        <button class="btn" onclick="shareRequest()">Share</button>
        <button class="btn btnGray" onclick="copyLink()">Copy Link</button>
      </div>

      <div class="success" id="okMsg">✔ Copied / Shared</div>
    </div>

  </div>

<script>
  // session check
  if(!sessionStorage.getItem("user")){
    window.location="index.html";
  }

  function getUPI(){
    // demo UPI based on username
    let u = (sessionStorage.getItem("user") || "user").toLowerCase().replace(/\s+/g,'');
    return u + "@stpay";
  }

  function buildUPILink(){
    // Basic UPI deep link format (works on phones with UPI apps)
    // upi://pay?pa=<upiId>&pn=<name>&am=<amount>&tn=<note>
    const upi = encodeURIComponent(getUPI());
    const name = encodeURIComponent(sessionStorage.getItem("user") || "ST PAY User");
    const amt = encodeURIComponent(document.getElementById("reqAmount").value || "");
    const note = encodeURIComponent(document.getElementById("reqNote").value || "ST PAY Request");

    let url = `upi://pay?pa=${upi}&pn=${name}`;
    if(amt) url += `&am=${amt}`;
    if(note) url += `&tn=${note}`;
    return url;
  }

  function updateQR(){
    const upiLink = buildUPILink();
    document.getElementById("qrPayloadHint").innerText = upiLink;

    // QR image (online)
    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(upiLink);
    document.getElementById("qrImg").src = qrUrl;
  }

  function toast(){
    const ok = document.getElementById("okMsg");
    ok.style.display="block";
    setTimeout(()=> ok.style.display="none", 1400);
  }

  function copyUPI(){
    const upi = getUPI();
    navigator.clipboard?.writeText(upi);
    toast();
  }

  function copyLink(){
    const link = buildUPILink();
    navigator.clipboard?.writeText(link);
    toast();
  }

  async function shareRequest(){
    const link = buildUPILink();
    const title = "ST PAY - Payment Request";
    const text = "Pay me using this UPI link:\n" + link;

    try{
      if(navigator.share){
        await navigator.share({ title, text });
        toast();
      }else{
        // fallback copy
        navigator.clipboard?.writeText(link);
        alert("Share not supported. Link copied ✔");
      }
    }catch(e){
      // user cancelled share -> ignore
    }
  }

  function back(){
    window.location="dashboard.html";
  }

  // init
  window.onload = ()=>{
    document.getElementById("upiIdText").innerText = getUPI();
    updateQR();
  };
</script>

</body>
</html>
